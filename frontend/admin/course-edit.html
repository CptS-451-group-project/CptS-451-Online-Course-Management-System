<!DOCTYPE html>
<html>
  <head>
    <title>Edit Course</title>
    <script src="/assets/js/course-edit.js"></script>
  </head>
  <body>
    <form>
      <label for="courseId">Course ID:</label><br>
      <input type="text" id="courseId" name="courseId"><br>
      <label for="courseName">Course Name:</label><br>
      <input type="text" id="courseName" name="courseName"><br>
      <label for="courseTime">Course Time:</label><br>
      <input type="text" id="courseTime" name="courseTime"><br>
      <label for="location">Location:</label><br>
      <input type="text" id="location" name="location"><br>
      <label for="profId">Professor ID:</label><br>
      <input type="text" id="profId" name="profId"><br>
      <label for="description">Description:</label><br>
      <input type="text" id="description" name="description"><br>
    </form>
    <div>
      <Button id="delete">Delete</Button>
      <Button id="modify">Modify</Button>
      <Button id="create">Create</Button>
    </div>
  </body>
</html>
