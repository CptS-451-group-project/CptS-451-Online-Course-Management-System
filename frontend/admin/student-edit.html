<!DOCTYPE html>
<html>
  <head>
    <title>Edit Student</title>
    <script src="/frontend/assets/js/student-edit.js"></script>
    <link rel="stylesheet" href="/frontend/assets/style.css">
  </head>
  <body>
    <button onclick="window.location.href='/admin/index.html'">< Back to Dashboard</button>
    <div class="login">
      <h2>Edit / Create Student</h2>
      <form>
        <label for="studentId">Student ID:</label><br>
        <input type="text" id="studentId" name="courseId"><br>
        <label for="studentName">Student Name:</label><br>
        <input type="text" id="studentName" name="studentName"><br>
        <label for="studentEmail">Student Email:</label><br>
        <input type="text" id="studentEmail" name="studentEmail"><br>
        <label for="newPassword">New Student Password:</label><br>
        <input type="text" id="newPassword" name="newPassword"><br>
      </form>
      <Button id="create">Create</Button>
    </div>
  </body>
</html>
